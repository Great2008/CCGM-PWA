<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f1f3d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CCG World" />
    <meta name="description" content="CCG World — Christian Church Of God Mission. God First. Bible, Hymnal, Devotionals & Church Resources." />
    <title>CCG World</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet" />
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
        })
      }
    </script>
  </head>
  <body>

    <!-- ── SPLASH SCREEN ── -->
    <div id="ccg-splash" style="
      position: fixed; inset: 0; z-index: 99999;
      background: #0f1f3d;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.6s ease;
    ">
      <video
        id="ccg-splash-video"
        src="/splash.mp4"
        autoplay
        muted
        playsinline
        preload="auto"
        style="width: 100%; height: 100%; object-fit: cover;"
      ></video>
    </div>

    <script>
      (function () {
        var splash = document.getElementById('ccg-splash')
        var video  = document.getElementById('ccg-splash-video')
        var dismissed = false

        function dismiss() {
          if (dismissed) return
          dismissed = true
          splash.style.opacity = '0'
          setTimeout(function () {
            splash.style.display = 'none'
          }, 650)
        }

        // Dismiss when video ends
        video.addEventListener('ended', dismiss)

        // Safety fallback — dismiss after 5.8s no matter what
        setTimeout(dismiss, 5800)

        // If video fails to load (e.g. offline, slow connection) dismiss quickly
        video.addEventListener('error', function () {
          setTimeout(dismiss, 300)
        })

        // On very slow devices the video may stall — dismiss if it hasn't
        // started playing within 2 seconds
        setTimeout(function () {
          if (video.paused && !dismissed) dismiss()
        }, 2000)
      })()
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
