    <!-- Inline splash styles — paint immediately before any JS loads -->
    <style>
      #ccg-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        /* Green radial gradient — matches native Android splash exactly:
           GREEN_CORE #00b250 (cx=50%, cy=22%) → GREEN_MID #48c878 → WHITE_TINT #dcf5e6
           Ellipse sized to cover all corners from the 22%-high focal point. */
        background: radial-gradient(ellipse 144% 156% at 50% 22%, #00b250 0%, #48c878 45%, #dcf5e6 100%);
        opacity: 1;
        transition: opacity 0.6s ease;
        padding-bottom: 18%;
        user-select: none;
      }
      #ccg-splash img {
        width: clamp(160px, 50vw, 270px);
        height: auto;
        object-fit: contain;
        margin-bottom: 28px;
        filter: drop-shadow(0 4px 16px rgba(0,80,20,0.18));
      }
      #ccg-splash-title {
        font-family: Georgia, "Playfair Display", serif;
        font-weight: 900;
        font-size: clamp(2rem, 10vw, 3rem);
        color: #053a14;
        letter-spacing: -0.01em;
        line-height: 1.1;
        text-align: center;
      }
      #ccg-splash-sub {
        font-family: Georgia, "Playfair Display", serif;
        font-weight: 400;
        font-size: clamp(0.82rem, 3.8vw, 1rem);
        color: #0a6e28;
        margin-top: 10px;
        text-align: center;
        letter-spacing: 0.01em;
      }
    </style>

  <body>


    <div id="ccg-splash">
      <!-- logo-splash.webp is identical to logo.webp — single WebP asset, no PNG fallback needed -->
      <img src="/logo-splash.webp" alt="CCG World" fetchpriority="high" decoding="sync" width="270" height="270" />
      <div id="ccg-splash-title">CCG World</div>
      <div id="ccg-splash-sub">Christian Church Of God Mission</div>
    </div>

    <script>
      window.__ccgHideSplash = function () {
        var el = document.getElementById('ccg-splash')
        if (!el) return
        el.style.opacity = '0'
        setTimeout(function () { el.style.display = 'none' }, 650)
      }

      // Cookie: skip splash animation on return visits (show for max 300ms)
      // Cookie is set by the app after first load completes
      var hasVisited = document.cookie.split(';').some(function(c) {
        return c.trim().startsWith('ccgm_visited=')
      })
      if (hasVisited) {
        // Return visitor: hide splash almost immediately
        setTimeout(function () {
          window.__ccgHideSplash && window.__ccgHideSplash()
        }, 300)
      } else {
        // First visit: show full splash, then set cookie
        setTimeout(function () {
          window.__ccgHideSplash && window.__ccgHideSplash()
          // Set cookie for 30 days
          var expires = new Date(Date.now() + 30 * 864e5).toUTCString()
          document.cookie = 'ccgm_visited=1; path=/; expires=' + expires + '; SameSite=Lax'
        }, 3500)
      }
    </script>
