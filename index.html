    <!-- Inline splash styles — paint immediately before any JS loads -->
    <style>
      #ccg-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #00b250;
        opacity: 1;
        transition: opacity 0.6s ease;
        padding-bottom: 18%;
        user-select: none;
      }
      #ccg-splash img {
        width: clamp(160px, 50vw, 270px);
        height: auto;
        object-fit: contain;
        margin-bottom: 28px;
        filter: drop-shadow(0 4px 16px rgba(0,80,20,0.18));
      }
      #ccg-splash-title {
        font-family: Georgia, "Playfair Display", serif;
        font-weight: 900;
        font-size: clamp(2rem, 10vw, 3rem);
        color: #053a14;
        letter-spacing: -0.01em;
        line-height: 1.1;
        text-align: center;
      }
      #ccg-splash-sub {
        font-family: Georgia, "Playfair Display", serif;
        font-weight: 400;
        font-size: clamp(0.82rem, 3.8vw, 1rem);
        color: #0a6e28;
        margin-top: 10px;
        text-align: center;
        letter-spacing: 0.01em;
      }
    </style>

  <body>

    <!-- ── SPLASH SCREEN ── -->
    <!-- Visible immediately (pure CSS/HTML, no JS needed to paint).
         React's AppSplash takes over once the bundle loads;
         this div is hidden via ccgSplashDismiss() which App.jsx calls
         by setting window.__ccgHideSplash after mounting. -->
    <div id="ccg-splash">
      <img src="/logo.png" alt="CCG World" />
      <div id="ccg-splash-title">CCG World</div>
      <div id="ccg-splash-sub">Christian Church Of God Mission</div>
    </div>

    <script>
      // Called by App.jsx after React mounts, so the HTML splash hands off
      // cleanly to the React AppSplash which then fades itself out.
      window.__ccgHideSplash = function () {
        var el = document.getElementById('ccg-splash')
        if (!el) return
        el.style.opacity = '0'
        setTimeout(function () { el.style.display = 'none' }, 650)
      }

      // Hard safety fallback — if React never calls it (e.g. JS error),
      // dismiss after 6s so the app is not permanently blocked.
      setTimeout(function () {
        window.__ccgHideSplash && window.__ccgHideSplash()
      }, 6000)
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
