    <!-- ── SPLASH SCREEN ── -->
    <div id="ccg-splash" style="
      position: fixed; inset: 0; z-index: 99999;
      background: #0f1f3d;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.6s ease;
    ">
      <video
        id="ccg-splash-video"
        src="/splash.mp4"
        autoplay
        muted
        playsinline
        preload="auto"
        style="width: 100%; height: 100%; object-fit: cover;"
      ></video>
    </div>

    <script>
      (function () {
        var splash = document.getElementById('ccg-splash')
        var video  = document.getElementById('ccg-splash-video')
        var dismissed = false

        function dismiss() {
          if (dismissed) return
          dismissed = true
          splash.style.opacity = '0'
          setTimeout(function () {
            splash.style.display = 'none'
          }, 650)
        }

        // Dismiss when video ends
        video.addEventListener('ended', dismiss)

        // Safety fallback — dismiss after 5.8s no matter what
        setTimeout(dismiss, 5800)

        // If video fails to load (e.g. offline, slow connection) dismiss quickly
        video.addEventListener('error', function () {
          setTimeout(dismiss, 300)
        })

        // On very slow devices the video may stall — dismiss if it hasn't
        // started playing within 2 seconds
        setTimeout(function () {
          if (video.paused && !dismissed) dismiss()
        }, 2000)
      })()
    </script>

    <script type="module" src="/src/main.jsx"></script>
